<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackwood: El Legado de las Sombras</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,600;1,400&family=Special+Elite&display=swap');

        :root {
            --bg-color: #020617;
            --accent: #fbbf24;
            --noir-dark: #0f172a;
        }

        body {
            background-color: var(--bg-color);
            color: #f1f5f9;
            font-family: 'Crimson Pro', serif;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            user-select: none;
            touch-action: manipulation;
        }

        /* Capas de Ambiente */
        .rain {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            background: linear-gradient(to bottom, rgba(2,6,23,0.9), rgba(2,6,23,1));
        }

        .drop {
            position: absolute;
            background: rgba(255,255,255,0.15);
            width: 1px;
            height: 60px;
            top: -100px;
            animation: fall 0.7s linear infinite;
        }

        @keyframes fall { to { transform: translateY(110vh); } }

        .lightning-flash {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            opacity: 0;
            z-index: 100;
            pointer-events: none;
        }

        .flash-active { animation: flashEffect 0.5s ease-out; }
        @keyframes flashEffect {
            0% { opacity: 0; }
            5% { opacity: 0.8; }
            15% { opacity: 0; }
            20% { opacity: 0.4; }
            100% { opacity: 0; }
        }

        /* Contenedor y Transiciones */
        #game-container {
            position: relative;
            z-index: 10;
            max-width: 500px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(15px);
            border-left: 1px solid #334155;
            border-right: 1px solid #334155;
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
        }

        .scene-transition {
            position: absolute;
            inset: 0;
            background: black;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .scene-transition.active { opacity: 1; }

        .visual-area {
            height: 32vh;
            background: radial-gradient(circle, #1e293b 0%, #000 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 6rem;
            position: relative;
            overflow: hidden;
        }

        .visual-overlay {
            position: absolute;
            bottom: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(15, 23, 42, 1) 0%, transparent 60%);
        }

        /* Interacción de Botones */
        .choice-btn {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.6) 0%, rgba(15, 23, 42, 0.8) 100%);
            border: 1px solid #475569;
            padding: 1.1rem;
            text-align: left;
            border-radius: 0.85rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 15px;
            color: #cbd5e1;
            font-size: 1.1rem;
        }

        .choice-btn:hover {
            border-color: var(--accent);
            transform: scale(1.02) translateX(5px);
            color: #fff;
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.1);
        }

        /* Puzles */
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 260px; margin: 15px auto; }
        .key {
            background: #1e293b;
            padding: 20px;
            text-align: center;
            border-radius: 12px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
            font-weight: bold;
            font-family: 'Special Elite', cursive;
        }
        .key:active { transform: scale(0.9); background: var(--accent); color: black; }

        /* Inventario Animado */
        .inv-slot {
            width: 40px; height: 40px;
            background: rgba(0,0,0,0.4);
            border: 1px solid #334155;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            animation: pulseInv 2s infinite ease-in-out;
        }

        @keyframes pulseInv {
            0%, 100% { border-color: #334155; transform: scale(1); }
            50% { border-color: var(--accent); transform: scale(1.05); }
        }

        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
    </style>
</head>
<body>

    <div class="lightning-flash" id="flash"></div>
    <div class="rain" id="rain-layer"></div>
    <div class="scene-transition" id="transition-curtain"></div>

    <div id="game-container">
        <!-- Header con Inventario -->
        <header class="p-5 flex justify-between items-center border-b border-slate-800 bg-black/40">
            <div>
                <h1 class="text-[9px] uppercase tracking-[0.4em] text-slate-500 font-black">Investigación #772</h1>
                <p id="location-name" class="text-sm font-bold text-amber-500/90 tracking-wide uppercase">Cargando...</p>
            </div>
            <div id="inventory" class="flex gap-2"></div>
        </header>

        <!-- Visualizador de Escena -->
        <div class="visual-area">
            <span id="visual-emoji" class="drop-shadow-2xl">🏰</span>
            <div class="visual-overlay"></div>
        </div>

        <!-- Narrativa Principal -->
        <div class="flex-grow p-7 overflow-y-auto">
            <div id="story-box" class="space-y-6">
                <div id="main-text" class="text-xl leading-relaxed text-slate-200 font-light min-h-[120px]"></div>
                <div id="puzzle-area" class="hidden bg-slate-900/80 p-5 rounded-2xl border border-slate-700 shadow-2xl">
                    <!-- Se inyectan puzles aquí -->
                </div>
            </div>
        </div>

        <!-- Opciones de Jugador -->
        <div id="choices-container" class="p-6 grid gap-4 border-t border-slate-800 bg-slate-950/90">
            <!-- Botones generados -->
        </div>

        <div class="p-2 text-[9px] uppercase tracking-widest text-center text-slate-700 bg-black border-t border-slate-900">
            Interactive Fiction Engine • V.3.0.0
        </div>
    </div>

<script>
    const state = {
        location: 'vestibulo',
        inventory: new Set(),
        flags: {
            lucesOK: false,
            cajaAbierta: false,
            notaLeida: false,
            finalAlternativo: false
        },
        puzzleInput: "",
        isTyping: false
    };

    const scenes = {
        vestibulo: {
            name: "El Hall de Entrada",
            emoji: "🏰",
            text: "La oscuridad es casi total. El panel eléctrico a la izquierda echa chispas. Al fondo, la escalera hacia la biblioteca parece gemir bajo el viento.",
            choices: [
                { text: "Reparar Fusibles", target: "puzle_fusibles", icon: "⚡" },
                { text: "Subir a la Biblioteca", target: "biblioteca", icon: "📚" },
                { text: "Ir a la Cocina", target: "cocina", icon: "🍳" }
            ]
        },
        puzle_fusibles: {
            name: "Panel de Fusibles",
            emoji: "🔌",
            text: "El sistema está bloqueado. Debes pulsar los interruptores en el orden correcto de energía: Azul, Amarillo, Rojo.",
            isPuzzle: "sequence",
            sequence: ["Azul", "Amarillo", "Rojo"],
            onSolve: () => state.flags.lucesOK = true,
            choices: [{ text: "Volver", target: "vestibulo", icon: "⬅️" }]
        },
        biblioteca: {
            name: "Gran Biblioteca",
            emoji: "📖",
            text: "Los libros parecen susurrar. Con las luces encendidas, ves una mancha de tinta que apunta a un código: '04-12'. Es la fecha de la desaparición.",
            onEnter: () => state.flags.notaLeida = true,
            choices: [
                { text: "Bajar al Vestíbulo", target: "vestibulo", icon: "⬅️" },
                { text: "Revisar el Escritorio", target: "escritorio", icon: "✒️" }
            ]
        },
        escritorio: {
            name: "Escritorio del Conde",
            emoji: "🔐",
            text: "Un pequeño teclado digital bloquea el cajón secreto. 'Día y Mes de la Tragedia', reza un grabado.",
            isPuzzle: "keypad",
            solution: "0412",
            onSolve: () => addItem("Daga de Plata"),
            choices: [{ text: "Alejarse", target: "biblioteca", icon: "⬅️" }]
        },
        cocina: {
            name: "Cocina de Servicio",
            emoji: "🔪",
            text: "El mayordomo te observa desde las sombras. 'No debería estar aquí, detective'. Su mano derecha está oculta tras su espalda.",
            choices: [
                { text: "Enfrentarlo", target: "confrontacion", icon: "🕵️" },
                { text: "Escapar al Hall", target: "vestibulo", icon: "⬅️" }
            ]
        },
        confrontacion: {
            name: "El Momento de la Verdad",
            emoji: "⚖️",
            text: "El mayordomo avanza. 'El secreto de los Blackwood morirá con usted'. ¿Tienes pruebas para detenerlo?",
            condition: () => state.inventory.has("Daga de Plata") && state.flags.notaLeida,
            targetIfTrue: "final_bueno",
            choices: [{ text: "¡No tengo nada!", target: "final_malo", icon: "💀" }]
        },
        final_bueno: {
            name: "Justicia",
            emoji: "🎖️",
            text: "Muestras la Daga de Plata y mencionas la fecha. El mayordomo se derrumba. Has resuelto el crimen más famoso del siglo. Eres una leyenda.",
            choices: [{ text: "Volver a empezar", target: "vestibulo", isReset: true, icon: "🔄" }]
        },
        final_malo: {
            name: "Desaparición",
            emoji: "🌑",
            text: "Sin pruebas, nadie te creerá. El mayordomo sonríe mientras la oscuridad te envuelve. Te has convertido en otro secreto de la mansión.",
            choices: [{ text: "Intentar de nuevo", target: "vestibulo", isReset: true, icon: "🔄" }]
        }
    };

    function typeWriter(text, element) {
        state.isTyping = true;
        element.textContent = "";
        let i = 0;
        function step() {
            if (i < text.length) {
                element.textContent += text.charAt(i);
                i++;
                setTimeout(step, 25);
            } else {
                state.isTyping = false;
            }
        }
        step();
    }

    function triggerLightning() {
        const f = document.getElementById('flash');
        f.classList.add('flash-active');
        setTimeout(() => f.classList.remove('flash-active'), 500);
        document.getElementById('game-container').classList.add('shake');
        setTimeout(() => document.getElementById('game-container').classList.remove('shake'), 400);
    }

    async function changeScene(target) {
        const curtain = document.getElementById('transition-curtain');
        curtain.classList.add('active');
        
        await new Promise(r => setTimeout(r, 400));
        state.location = target;
        if (scenes[target].onEnter) scenes[target].onEnter();
        render();
        
        curtain.classList.remove('active');
    }

    function render() {
        const scene = scenes[state.location];
        document.getElementById('location-name').textContent = scene.name;
        document.getElementById('visual-emoji').textContent = scene.emoji;
        
        const mainText = document.getElementById('main-text');
        typeWriter(scene.text, mainText);

        const pArea = document.getElementById('puzzle-area');
        pArea.innerHTML = "";
        pArea.classList.add('hidden');

        // Lógica de Puzles
        if (scene.isPuzzle === "sequence" && !state.flags.lucesOK) {
            pArea.classList.remove('hidden');
            const colors = ["Amarillo", "Azul", "Rojo"];
            pArea.innerHTML = `<p class="text-xs text-slate-500 mb-4 uppercase">Secuencia de Carga: Azul-Amarillo-Rojo</p>`;
            colors.forEach(c => {
                const b = document.createElement('button');
                b.className = "w-full p-3 mb-2 rounded-lg bg-slate-800 border border-slate-600 font-bold";
                b.textContent = `Interruptor ${c}`;
                b.onclick = () => {
                    if (c === scene.sequence[state.puzzleInput.length]) {
                        state.puzzleInput += "1";
                        b.style.borderColor = "#fbbf24";
                        if (state.puzzleInput.length === 3) {
                            scene.onSolve();
                            state.puzzleInput = "";
                            triggerLightning();
                            alert("¡SISTEMA RESTAURADO!");
                            render();
                        }
                    } else {
                        state.puzzleInput = "";
                        triggerLightning();
                        alert("ERROR: SOBRECARGA");
                        render();
                    }
                };
                pArea.appendChild(b);
            });
        }

        if (scene.isPuzzle === "keypad") {
            pArea.classList.remove('hidden');
            renderKeypad(scene);
        }

        // Botones de Acción
        const container = document.getElementById('choices-container');
        container.innerHTML = "";
        
        // Lógica de condición especial para confrontación
        let currentChoices = scene.choices;
        if (scene.targetIfTrue && scene.condition()) {
            currentChoices = [{ text: "¡Arrestar al Mayordomo!", target: scene.targetIfTrue, icon: "⚔️" }];
        }

        currentChoices.forEach(c => {
            const btn = document.createElement('button');
            btn.className = "choice-btn";
            btn.innerHTML = `<span>${c.icon}</span> <span>${c.text}</span>`;
            btn.onclick = () => {
                if (state.isTyping) return;
                if (c.isReset) resetGame();
                changeScene(c.target);
            };
            container.appendChild(btn);
        });

        updateInventory();
    }

    function renderKeypad(scene) {
        const pArea = document.getElementById('puzzle-area');
        pArea.innerHTML = `
            <div class="text-center font-mono text-3xl mb-4 p-3 bg-black text-amber-500 border-2 border-amber-900 rounded-lg shadow-inner">
                ${state.puzzleInput.padEnd(4, '•')}
            </div>
            <div class="keypad">
                ${[1,2,3,4,5,6,7,8,9,'C',0,'OK'].map(k => `
                    <div class="key" onclick="handleKey('${k}', '${scene.solution}')">${k}</div>
                `).join('')}
            </div>
        `;
    }

    window.handleKey = (k, sol) => {
        if (k === 'C') state.puzzleInput = "";
        else if (k === 'OK') {
            if (state.puzzleInput === sol) {
                scenes[state.location].onSolve();
                alert("CAJÓN ABIERTO: Encontraste la Daga.");
                state.puzzleInput = "";
                changeScene("biblioteca");
            } else {
                state.puzzleInput = "";
                triggerLightning();
            }
        } else if (state.puzzleInput.length < 4) {
            state.puzzleInput += k;
        }
        render();
    };

    function addItem(it) {
        state.inventory.add(it);
        updateInventory();
    }

    function updateInventory() {
        const inv = document.getElementById('inventory');
        inv.innerHTML = "";
        state.inventory.forEach(it => {
            const slot = document.createElement('div');
            slot.className = "inv-slot";
            slot.innerHTML = it === "Daga de Plata" ? "🗡️" : "📦";
            inv.appendChild(slot);
        });
    }

    function resetGame() {
        state.inventory = new Set();
        state.flags = { lucesOK: false, cajaAbierta: false, notaLeida: false };
        state.puzzleInput = "";
    }

    function initRain() {
        const l = document.getElementById('rain-layer');
        for (let i = 0; i < 50; i++) {
            const d = document.createElement('div');
            d.className = 'drop';
            d.style.left = Math.random() * 100 + 'vw';
            d.style.animationDuration = (0.5 + Math.random() * 0.5) + 's';
            d.style.animationDelay = Math.random() * 2 + 's';
            l.appendChild(d);
        }
    }

    window.onload = () => {
        initRain();
        render();
        setInterval(() => { if (Math.random() > 0.98) triggerLightning(); }, 4000);
    };
</script>
</body>
</html>
